name: CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "shared/**"

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER_STAGING: siteforge-staging
  EKS_CLUSTER_PROD: siteforge-production
  HELM_CHART_PATH: infrastructure/helm/siteforge

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Detect changed services
  # ---------------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        run: |
          CHANGED_SERVICES=$(git diff --name-only HEAD~1 HEAD | grep "^services/" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          SHARED_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep "^shared/" | wc -l)

          if [ "$SHARED_CHANGED" -gt 0 ]; then
            ALL_SERVICES=$(ls -d services/*/ | xargs -n1 basename | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "services=$ALL_SERVICES" >> $GITHUB_OUTPUT
          else
            echo "services=$CHANGED_SERVICES" >> $GITHUB_OUTPUT
          fi

  # ---------------------------------------------------------------------------
  # Build and push to ECR
  # ---------------------------------------------------------------------------
  build-push:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    strategy:
      fail-fast: true
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          IMAGE_TAG="v${TIMESTAMP}-${SHORT_SHA}"
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "full_image=${{ env.ECR_REGISTRY }}/siteforge/${{ matrix.service }}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/siteforge/${{ matrix.service }}:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/siteforge/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_REF=${{ github.ref_name }}

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

  # ---------------------------------------------------------------------------
  # Deploy to Staging
  # ---------------------------------------------------------------------------
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-push]
    environment:
      name: staging
      url: https://staging-api.siteforge.ai/health
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_STAGING }} --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Deploy to staging
        run: |
          helm upgrade --install siteforge ${{ env.HELM_CHART_PATH }} \
            --namespace siteforge-staging \
            --create-namespace \
            --set global.imageRegistry=${{ env.ECR_REGISTRY }} \
            --set image.tag=${{ needs.build-push.outputs.image-tag }} \
            --set global.environment=staging \
            --values ${{ env.HELM_CHART_PATH }}/values.yaml \
            --values ${{ env.HELM_CHART_PATH }}/values-staging.yaml \
            --wait \
            --timeout 10m

      - name: Verify deployment rollout
        run: |
          SERVICES='${{ needs.detect-changes.outputs.services }}'
          for SERVICE in $(echo $SERVICES | jq -r '.[]'); do
            echo "Checking rollout status for $SERVICE..."
            kubectl rollout status deployment/$SERVICE \
              --namespace siteforge-staging \
              --timeout=300s
          done

  # ---------------------------------------------------------------------------
  # Smoke tests on staging
  # ---------------------------------------------------------------------------
  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          STAGING_URL="https://staging-api.siteforge.ai"

          echo "Testing health endpoint..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/health")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Health check passed"

          echo "Testing API gateway..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/api/v1/status")
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "401" ]; then
            echo "API gateway check failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "API gateway check passed"

      - name: Run E2E tests against staging
        run: |
          pnpm install --frozen-lockfile
          pnpm test:e2e:staging
        env:
          STAGING_API_URL: https://staging-api.siteforge.ai
          TEST_API_KEY: ${{ secrets.STAGING_TEST_API_KEY }}
        continue-on-error: false

  # ---------------------------------------------------------------------------
  # Manual approval gate for production
  # ---------------------------------------------------------------------------
  approval-gate:
    runs-on: ubuntu-latest
    needs: smoke-test
    environment:
      name: production-approval
    steps:
      - name: Approval received
        run: echo "Production deployment approved"

  # ---------------------------------------------------------------------------
  # Deploy to Production
  # ---------------------------------------------------------------------------
  deploy-production:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-push, approval-gate]
    environment:
      name: production
      url: https://api.siteforge.ai/health
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_PROD }} --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Deploy to production
        run: |
          helm upgrade --install siteforge ${{ env.HELM_CHART_PATH }} \
            --namespace siteforge-prod \
            --create-namespace \
            --set global.imageRegistry=${{ env.ECR_REGISTRY }} \
            --set image.tag=${{ needs.build-push.outputs.image-tag }} \
            --set global.environment=production \
            --values ${{ env.HELM_CHART_PATH }}/values.yaml \
            --values ${{ env.HELM_CHART_PATH }}/values-production.yaml \
            --wait \
            --timeout 15m

      - name: Verify production deployment
        run: |
          SERVICES='${{ needs.detect-changes.outputs.services }}'
          for SERVICE in $(echo $SERVICES | jq -r '.[]'); do
            echo "Checking rollout status for $SERVICE..."
            kubectl rollout status deployment/$SERVICE \
              --namespace siteforge-prod \
              --timeout=300s
          done

      - name: Production health check
        run: |
          for i in $(seq 1 5); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://api.siteforge.ai/health")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Attempt $i: Health check returned $HTTP_STATUS, retrying..."
            sleep 10
          done
          echo "Production health check failed after 5 attempts"
          exit 1

      - name: Create GitHub release tag
        run: |
          TAG="release-$(date +%Y%m%d%H%M%S)-$(echo ${{ github.sha }} | cut -c1-8)"
          git tag $TAG
          git push origin $TAG

  # ---------------------------------------------------------------------------
  # Post-deployment notifications
  # ---------------------------------------------------------------------------
  notify:
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    steps:
      - name: Notify on success
        if: needs.deploy-production.result == 'success'
        run: |
          echo "Deployment succeeded. Services deployed: ${{ needs.detect-changes.outputs.services }}"
          # Add Slack/Teams notification here

      - name: Notify on failure
        if: needs.deploy-production.result == 'failure'
        run: |
          echo "Deployment failed. Check workflow logs for details."
          # Add Slack/Teams notification here
          exit 1
