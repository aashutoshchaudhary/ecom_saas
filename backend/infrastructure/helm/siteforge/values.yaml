global:
  imageRegistry: ""
  imagePullSecrets: []
  environment: production

image:
  registry: ""
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# ---------------------------------------------------------------------------
# Microservice definitions
# ---------------------------------------------------------------------------
services:
  api-gateway:
    enabled: true
    replicaCount: 2
    port: 3000
    image:
      repository: siteforge/api-gateway
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env:
      SERVICE_NAME: api-gateway
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPU: 70

  auth-service:
    enabled: true
