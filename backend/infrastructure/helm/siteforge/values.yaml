# ---------------------------------------------------------------------------
# Infrastructure configuration
# ---------------------------------------------------------------------------
database:
  host: ""
  port: 5432
  username: siteforge
  existingSecret: siteforge-db-credentials
  secretKey: password

redis:
  host: redis-master
  port: 6379
  existingSecret: siteforge-redis-credentials
  secretKey: password

kafka:
  brokers: kafka:9092
  existingSecret: ""

s3:
  endpoint: ""
  bucket: siteforge-assets
  region: us-east-1
  existingSecret: siteforge-s3-credentials

ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: ""
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/healthcheck-path: /health
  host: api.siteforge.ai
  tls: true

# External dependency charts
postgresql:
  enabled: false

redis:
  enabled: false

kafka:
  enabled: false
