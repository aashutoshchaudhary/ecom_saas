    ports:
      - "5439:5432"
    environment:
      POSTGRES_USER: siteforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siteforge-dev}
      POSTGRES_MULTIPLE_DATABASES: plugin_db,domain_db,email_db,pos_db
    volumes:
      - postgres-platform-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siteforge"]
      interval: 10s
