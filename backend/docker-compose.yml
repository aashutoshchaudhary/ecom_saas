version: "3.9"

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - siteforge-network
  environment: &common-env
    REDIS_HOST: redis
    REDIS_PORT: 6379
    KAFKA_BROKERS: kafka:29092
    JWT_SECRET: ${JWT_SECRET:-siteforge-dev-jwt-secret-change-in-production}
    NODE_ENV: ${NODE_ENV:-development}
    S3_ENDPOINT: http://minio:9000
    S3_ACCESS_KEY: ${MINIO_ROOT_USER:-siteforge}
    S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-siteforge-secret}
    S3_BUCKET: ${S3_BUCKET:-siteforge-assets}

services:
  # ---------------------------------------------------------------------------
  # Infrastructure Services
  # ---------------------------------------------------------------------------

  postgres-identity:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: siteforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siteforge-dev}
      POSTGRES_MULTIPLE_DATABASES: auth_db,user_db,role_db
    volumes:
      - postgres-identity-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siteforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siteforge-network

  postgres-core:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: siteforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siteforge-dev}
      POSTGRES_MULTIPLE_DATABASES: tenant_db,industry_db
    volumes:
      - postgres-core-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siteforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siteforge-network

  postgres-website:
    image: postgres:16-alpine
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: siteforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siteforge-dev}
      POSTGRES_MULTIPLE_DATABASES: website_db,template_db,theme_db
    volumes:
      - postgres-website-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siteforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siteforge-network

  postgres-ai:
    image: postgres:16-alpine
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: siteforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siteforge-dev}
      POSTGRES_MULTIPLE_DATABASES: ai_db,ai_version_db
    volumes:
      - postgres-ai-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siteforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siteforge-network

  postgres-commerce:
    image: postgres:16-alpine
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: siteforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siteforge-dev}
      POSTGRES_MULTIPLE_DATABASES: product_db,inventory_db,pricing_db
    volumes:
