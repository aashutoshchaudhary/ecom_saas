  postgres-insights:
    image: postgres:16-alpine
    ports:
      - "5440:5432"
    environment:
      POSTGRES_USER: siteforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siteforge-dev}
      POSTGRES_MULTIPLE_DATABASES: analytics_db,reporting_db,notification_db
    volumes:
      - postgres-insights-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siteforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siteforge-network

  postgres-system:
    image: postgres:16-alpine
    ports:
      - "5441:5432"
    environment:
      POSTGRES_USER: siteforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siteforge-dev}
      POSTGRES_MULTIPLE_DATABASES: media_db,config_db,audit_db
    volumes:
      - postgres-system-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siteforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siteforge-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siteforge-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - siteforge-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_started
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - siteforge-network

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-siteforge}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-siteforge-secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siteforge-network

  # ---------------------------------------------------------------------------
  # Microservices (28 services, ports 3000-3027)
  # ---------------------------------------------------------------------------

  api-gateway:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      <<: *common-env
      SERVICE_NAME: api-gateway
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  auth-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "3001:3001"
