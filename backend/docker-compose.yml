      POSTGRES_USER: siteforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siteforge-dev}
      POSTGRES_MULTIPLE_DATABASES: order_db,payment_db,refund_db,wallet_db
    volumes:
